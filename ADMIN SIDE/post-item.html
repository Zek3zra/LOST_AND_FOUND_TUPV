<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard - Post Item & Reports</title>
<!-- External CSS -->
<link rel="stylesheet" href="post-item.css" />
<link rel="stylesheet" href="css/all.min.css" />
</head>
<body>

<!-- Hamburger for mobile -->
<div class="hamburger" id="hamburger" aria-label="Menu" role="button" tabindex="0" aria-expanded="false">
  <span></span>
  <span></span>
  <span></span>
</div>

<!-- Sidebar for mobile -->
<div id="sidebar" aria-hidden="true">
  <a href="#">
    <button class="nav-button" data-section="overview">
      <i class="fa-solid fa-database"></i> Overview
    </button>
  </a>
  <a href="#">
    <button class="nav-button active" data-section="post-item">
      <i class="fa-solid fa-pen-to-square"></i> Post Item
    </button>
  </a>
  <a href="#">
    <button class="nav-button" data-section="reports">
      <i class="fa-solid fa-bell"></i> Reports
    </button>
  </a>
  <a href="#">
    <button class="nav-button" data-section="users">
      <i class="fa-solid fa-circle-user"></i> Users
    </button>
  </a>
</div>

<!-- Desktop Navbar -->
<nav>
  <a href="#"><button class="nav-button active" data-section="overview"><i class="fa-solid fa-database"></i> Overview</button></a>
  <a href="#"><button class="nav-button" data-section="post-item"><i class="fa-solid fa-pen-to-square"></i> Post Item</button></a>
  <a href="#"><button class="nav-button" data-section="reports"><i class="fa-solid fa-bell"></i> Reports</button></a>
  <a href="#"><button class="nav-button" data-section="users"><i class="fa-solid fa-circle-user"></i> Users</button></a>
</nav>

<!-- Action Buttons -->
<div style="text-align: center; margin: 20px 0;">
  <h2><strong>Status</strong>
  <button class="btn post-btn">Found Items</button>
  <button class="btn lost-btn">Lost Items</button>
  </h2>
</div>

<!-- Post Item Form -->
<form class="post-form">
  <h2>Lost and Found Items</h2>
  <div>
    <label for="itemName">Item Name:</label>
    <input type="text" id="itemName" placeholder="Enter item name" required />
  </div>
  <div>
    <label for="description">Description:</label>
    <input type="text" id="description" placeholder="Enter description" required />
  </div>
  <div>
    <label for="uploadPhoto">Upload Photo:</label>
    <input type="file" id="uploadPhoto" multiple required />
  </div>
  <div>
    <label for="location">Location:</label>
    <input type="text" id="location" placeholder="Enter location" />
  </div>
  <div>
    <label for="date">Date:</label>
    <input type="text" id="date" placeholder="Enter date" required />
  </div>
  <div>
    <label for="time">Time:</label>
    <input type="text" id="time" placeholder="Enter time" required />
  </div>
  <button type="submit" class="btn submit-btn">Submit Report</button>
</form>

<!-- Reports Management Table -->
<h2 style="text-align:center; margin-top:50px;">Reports Management</h2>
<table>
  <thead>
    <tr>
      <th>Item</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>Wallet</td>
      <td>Found</td>
      <td><a href="#">Review</a></td>
    </tr>
    <tr>
      <td>Keys</td>
      <td>Lost</td>
      <td><a href="#">Pending Match</a></td>
    </tr>
    <tr>
      <td>Backpack</td>
      <td>Found</td>
      <td><a href="#">Matches</a></td>
    </tr>
  </tbody>
</table>

<!-- Publish Button -->
<div style="text-align: center; margin: 30px 0;">
  <button class="publish-btn">Publish Post</button>
</div>
<script src="lost&found.js"></script>
</body>
</html>
